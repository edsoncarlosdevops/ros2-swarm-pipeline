# ============================================================================
# ROS 2 Swarm Pipeline - Docker Compose
#
# Simula uma frota de drones com nodes ROS 2 em Python E C++ se comunicando:
#
#   telemetry_pub (Python, 10Hz) ──/drone/odometry──> waypoint_planner (Python)
#       │                                                   │
#       │                                                   └──/drone/cmd_vel──> (futuro)
#       │
#       └──/drone/odometry──> drone_bridge (C++)
#                                     │
#                                     └── Cross-language DDS: Python → C++
#
# Para rodar:
#   docker compose build
#   docker compose up
# ============================================================================

services:
  # --- Node 1: Publica posicao do drone (10Hz) - PYTHON ---
  telemetry_pub:
    build:
      context: .
      dockerfile: cicd/Dockerfile
    container_name: drone_telemetry_pub
    command: telemetry_pub
    networks:
      - ros2_swarm
    environment:
      - ROS_DOMAIN_ID=42

  # --- Node 2: Assina /drone/odometry e salva dados para ETL - PYTHON ---
  telemetry_sub:
    build:
      context: .
      dockerfile: cicd/Dockerfile
    container_name: drone_telemetry_sub
    command: telemetry_sub
    depends_on:
      - telemetry_pub
    volumes:
      - ./data/raw:/ros2_ws/data/raw
    networks:
      - ros2_swarm
    environment:
      - ROS_DOMAIN_ID=42

  # --- Node 3: Planejador de waypoints - PYTHON ---
  waypoint_planner:
    build:
      context: .
      dockerfile: cicd/Dockerfile
    container_name: waypoint_planner
    command: waypoint_planner
    depends_on:
      - telemetry_pub
    networks:
      - ros2_swarm
    environment:
      - ROS_DOMAIN_ID=42

  # --- Node 4: C++ Bridge - COMUNICACAO CROSS-LANGUAGE ---
  # Python publisher -> DDS (Fast DDS) -> C++ subscriber
  drone_bridge:
    build:
      context: .
      dockerfile: cicd/Dockerfile
    container_name: drone_bridge_cpp
    command: ros2 run drone_bridge drone_bridge_node
    depends_on:
      - telemetry_pub
    networks:
      - ros2_swarm
    environment:
      - ROS_DOMAIN_ID=42

networks:
  ros2_swarm:
    driver: bridge
