# =============================================================================
# ROS 2 Swarm Pipeline - CI/CD Orchestrator
#
# Main workflow that orchestrates reusable shared templates.
# Each job delegates to a dedicated reusable workflow, following the
# shared template pattern that Andrea Vergine described as a priority
# for the Swarm Team DevOps platform at TII Abu Dhabi.
#
# Key design decisions:
#   1. Shared templates (reusable workflows) for DRY CI/CD
#   2. Composite actions for step-level reusability
#   3. Explicit dependency graph (needs) for pipeline efficiency
#   4. Matrix builds for multi-architecture (amd64 + arm64)
#
# Pipeline stages:
#   lint -> etl -> analyze         (data pipeline: MCAP -> Parquet -> DuckDB)
#   lint -> colcon-build           (C++ ROS 2 build with colcon)
#   lint -> docker-build -> integration (container validation)
# =============================================================================

name: ROS 2 Swarm Pipeline

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # --------------------------------------------------------------------------
  # Stage 1: Code Quality - Flake8 lint on all Python ROS 2 nodes
  # --------------------------------------------------------------------------
  lint:
    name: Code Quality
    uses: ./.github/workflows/lint.yml
    with:
      python-version: "3.12"
      max-line-length: 100

  # --------------------------------------------------------------------------
  # Stage 2: Data Pipeline - Generate MCAP, convert to Parquet, validate
  # --------------------------------------------------------------------------
  etl:
    name: ETL Pipeline
    needs: lint
    uses: ./.github/workflows/etl-pipeline.yml
    with:
      python-version: "3.12"
      mcap-count: 500

  # --------------------------------------------------------------------------
  # Stage 3: Analytics - DuckDB SQL queries on Parquet flight data
  # --------------------------------------------------------------------------
  analyze:
    name: DuckDB Analytics
    runs-on: ubuntu-latest
    needs: etl

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python environment with pip cache
        uses: ./.github/actions/setup-python
        with:
          python-version: "3.12"
          requirements: etl_pipeline/requirements.txt

      - name: Cache data artifacts between runs
        uses: actions/cache@v4
        with:
          path: |
            data/raw/
            data/processed/
          key: ${{ runner.os }}-data-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-data-

      - name: Execute DuckDB analytical queries
        run: python etl_pipeline/analyze_flight.py

      - name: Validate analytics results with assertions
        run: |
          python -c "
          import duckdb
          con = duckdb.connect()
          df = con.execute('''
              SELECT COUNT(*) as n,
                     ROUND(SUM(distance_delta), 1) as total_dist,
                     ROUND(AVG(speed_ms), 2) as avg_speed,
                     ROUND(AVG(z), 1) as avg_alt
              FROM read_parquet('data/processed/flight_data.parquet')
          ''').fetchdf()
          con.close()
          print(f'Samples: {df["n"].values[0]}')
          print(f'Distance: {df["total_dist"].values[0]} m')
          print(f'Speed avg: {df["avg_speed"].values[0]} m/s')
          print(f'Altitude:  {df["avg_alt"].values[0]} m')
          assert df['n'].values[0] > 0, 'Zero samples!'
          assert df['total_dist'].values[0] > 100, 'Low distance!'
          assert df['avg_speed'].values[0] > 1.0, 'Low speed!'
          print('Analytics validated!')
          "

  # --------------------------------------------------------------------------
  # Stage 4: C++ Build - Compile ROS 2 C++ nodes with colcon
  # --------------------------------------------------------------------------
  colcon-build:
    name: C++ Colcon Build
    needs: lint
    uses: ./.github/workflows/colcon-build.yml
    with:
      ros-distro: "jazzy"
      package-path: "ros2_nodes/drone_bridge"

  # --------------------------------------------------------------------------
  # Stage 5: Docker Build - Multi-architecture container images
  # --------------------------------------------------------------------------
  build-node-pub:
    name: Node telemetry_pub
    needs: lint
    uses: ./.github/workflows/docker-build.yml
    with:
      service-name: "pub"
      dockerfile: "cicd/Dockerfile"
      context: "."

  build-node-sub:
    name: Node telemetry_sub
    needs: build-node-pub
    uses: ./.github/workflows/docker-build.yml
    with:
      service-name: "sub"
      dockerfile: "cicd/Dockerfile"
      context: "."

  build-node-nav:
    name: Node waypoint_planner
    needs: build-node-pub
    uses: ./.github/workflows/docker-build.yml
    with:
      service-name: "nav"
      dockerfile: "cicd/Dockerfile"
      context: "."

  # --------------------------------------------------------------------------
  # Stage 6: Integration - Validate multi-node DDS communication
  # Tests: Python-to-Python DDS and Python-to-C++ cross-language DDS
  # --------------------------------------------------------------------------
  integration:
    name: Docker Compose Integration
    runs-on: ubuntu-latest
    needs: [build-node-pub, build-node-sub, build-node-nav]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Compose
        run: docker compose version

      - name: Start ROS 2 nodes and verify DDS communication
        run: |
          docker compose up -d
          sleep 5

          echo "=== Running containers ==="
          docker compose ps

          echo "=== Publisher node logs (Python, 10Hz) ==="
          docker compose logs telemetry_pub --tail 5

          echo "=== Subscriber node logs (Python, ETL) ==="
          docker compose logs telemetry_sub --tail 5

          echo "=== C++ Bridge node logs (cross-language DDS) ==="
          docker compose logs drone_bridge --tail 5

          echo "=== Waypoint Planner node logs (Python, navigation) ==="
          docker compose logs waypoint_planner --tail 5

          docker compose down
