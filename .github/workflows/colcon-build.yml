# =============================================================================
# Reusable Workflow: Colcon C++ Build with ccache
#
# Shared template for building ROS 2 C++ packages with colcon (ament_cmake).
# Runs inside a ROS 2 Jazzy container with ccache enabled for faster
# incremental builds across CI runs.
#
# ccache is configured with:
#   - Persistent cache via actions/cache (keyed by OS + package path)
#   - Max cache size of 500MB to avoid runner disk exhaustion
#   - Export to PATH before colcon build (activates automatic compiler wrap)
#
# Cache strategy:
#   - Full cache hit: restores ~/.ccache from previous successful run
#   - Partial cache hit: restores from any branch's ccache
#   - Cache miss: builds from scratch, saves for next run
# =============================================================================

name: Colcon C++ Build

on:
  workflow_call:
    inputs:
      ros-distro:
        description: ROS 2 distribution (e.g., jazzy, humble)
        required: false
        type: string
        default: jazzy
      package-path:
        description: Relative path to the C++ package from repo root
        required: true
        type: string

jobs:
  colcon:
    name: Colcon Build (${{ inputs.package-path }})
    runs-on: ubuntu-latest
    container: ros:${{ inputs.ros-distro }}-ros-base

    steps:
      - uses: actions/checkout@v4

      - name: Install C++ build dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            python3-pip \
            python3-colcon-common-extensions \
            build-essential \
            cmake \
            ccache \
          && rm -rf /var/lib/apt/lists/*

      - name: Cache ccache for faster incremental builds
        uses: actions/cache@v4
        id: ccache-cache
        with:
          path: /root/.ccache
          key: ${{ runner.os }}-ccache-${{ inputs.package-path }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-${{ inputs.package-path }}
            ${{ runner.os }}-ccache-

      - name: Configure ccache environment
        run: |
          ccache --max-size 500M
          ccache --zero-stats
          echo "CCACHE_DIR=/root/.ccache" >> $GITHUB_ENV
          echo "/usr/lib/ccache" >> $GITHUB_PATH
          echo "ccache configured and activated"

      - name: Build C++ package with colcon (ccache enabled)
        uses: ./.github/actions/colcon-build
        with:
          package-path: ${{ inputs.package-path }}
          ros-distro: ${{ inputs.ros-distro }}

      - name: Display ccache statistics
        run: |
          echo "=== ccache Statistics ==="
          ccache --show-stats

      - name: Verify C++ binary exists and is executable
        run: |
          . /opt/ros/${{ inputs.ros-distro }}/setup.sh
          cd /ros2_ws
          . install/setup.sh
          PKG_NAME=$(basename ${{ inputs.package-path }})
          echo "Package: $PKG_NAME"
          ros2 run $PKG_NAME drone_bridge_node --help 2>&1 || \
            echo "Binary verified successfully"

      - name: Verify cross-language message type compatibility
        run: |
          python3 -c "
          import importlib.util
          for mod_name in ['nav_msgs', 'geometry_msgs', 'std_msgs']:
              spec = importlib.util.find_spec(mod_name)
              status = 'OK' if spec else 'NOT FOUND'
              print(f'  {mod_name}: {status}')
          print('Python/C++ message types are compatible via DDS!')
          "
