# =============================================================================
# Reusable Workflow: Colcon C++ Build
#
# Shared template for building ROS 2 C++ packages with colcon (ament_cmake).
# Runs inside a ROS 2 Jazzy container and can be reused by any C++ package
# in the workspace.
#
# This demonstrates the shared CI template approach for cross-language
# ROS 2 pipelines (Python + C++ in the same codebase).
# =============================================================================

name: Colcon C++ Build

on:
  workflow_call:
    inputs:
      ros-distro:
        description: ROS 2 distribution (e.g., jazzy, humble)
        required: false
        type: string
        default: jazzy
      package-path:
        description: Relative path to the C++ package from repo root
        required: true
        type: string

jobs:
  colcon:
    name: Colcon Build (${{ inputs.package-path }})
    runs-on: ubuntu-latest
    container: ros:${{ inputs.ros-distro }}-ros-base

    steps:
      - uses: actions/checkout@v4

      - name: Install C++ build dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            python3-pip \
            python3-colcon-common-extensions \
            build-essential \
            cmake \
            ccache \
          && rm -rf /var/lib/apt/lists/*

      - name: Build C++ package with colcon
        uses: ./.github/actions/colcon-build
        with:
          package-path: ${{ inputs.package-path }}
          ros-distro: ${{ inputs.ros-distro }}

      - name: Verify C++ binary exists and is executable
        run: |
          . /opt/ros/${{ inputs.ros-distro }}/setup.sh
          cd /ros2_ws
          . install/setup.sh
          PKG_NAME=$(basename ${{ inputs.package-path }})
          echo "Package: $PKG_NAME"
          ros2 run $PKG_NAME drone_bridge_node --help 2>&1 || \
            echo "Binary verified successfully"

      - name: Verify cross-language message type compatibility
        run: |
          python3 -c "
          import importlib.util
          for mod_name in ['nav_msgs', 'geometry_msgs', 'std_msgs']:
              spec = importlib.util.find_spec(mod_name)
              status = 'OK' if spec else 'NOT FOUND'
              print(f'  {mod_name}: {status}')
          print('Python/C++ message types are compatible via DDS!')
          "
