# =============================================================================
# Composite Action: Docker Multi-architecture Build
#
# Shared template for building Docker images with Buildx.
# Supports both amd64 and arm64 architectures with layer caching.
#
# This implements the heterogeneous build pattern: different runner
# architectures (CPU, GPU, ARM64) with consistent build pipelines.
#
# Usage:
#   - uses: ./.github/actions/docker-build
#     with:
#       service-name: pub
#       dockerfile: cicd/Dockerfile
#       context: .
#       arch: arm64
# =============================================================================

name: Docker Multi-architecture Build
description: Builds Docker images for multiple architectures with Buildx

inputs:
  service-name:
    description: Logical name for the service (used in image tag)
    required: true
  dockerfile:
    description: Path to Dockerfile
    required: false
    default: cicd/Dockerfile
  context:
    description: Docker build context directory
    required: false
    default: .
  arch:
    description: Target architecture (amd64 or arm64)
    required: true
  image-name:
    description: Docker image name
    required: false
    default: ${{ github.repository }}

runs:
  using: composite
  steps:
    - name: Set up QEMU for multi-architecture emulation
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx with target platform
      uses: docker/setup-buildx-action@v3
      with:
        platforms: linux/${{ inputs.arch }}

    - name: Cache Docker layers for faster rebuilds
      uses: actions/cache@v4
      id: docker-cache
      with:
        path: /tmp/.buildx-cache-${{ inputs.service-name }}
        key: ${{ runner.os }}-buildx-${{ inputs.service-name }}-${{ inputs.arch }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildx-${{ inputs.service-name }}-${{ inputs.arch }}
          ${{ runner.os }}-buildx-${{ inputs.service-name }}

    - name: Build Docker image with Buildx
      uses: docker/build-push-action@v6
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        platforms: linux/${{ inputs.arch }}
        push: false
        cache-from: type=local,src=/tmp/.buildx-cache-${{ inputs.service-name }}
        cache-to: type=local,dest=/tmp/.buildx-cache-${{ inputs.service-name }}-new,mode=max
        load: true
        tags: ${{ inputs.image-name }}:${{ inputs.service-name }}-${{ inputs.arch }}-${{ github.sha }}

    - name: Move cache for next run
      shell: bash
      run: |
        rm -rf /tmp/.buildx-cache-${{ inputs.service-name }}
        mv /tmp/.buildx-cache-${{ inputs.service-name }}-new /tmp/.buildx-cache-${{ inputs.service-name }}
