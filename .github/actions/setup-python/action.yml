# =============================================================================
# Composite Action: Setup Python with pip cache
#
# Shared template for configuring Python with pip dependency caching.
# Used by ALL jobs in the pipeline to avoid repetition of the same
# setup steps across multiple workflow files.
#
# Any team can include this action and get consistent Python environment
# configuration with zero duplication.
#
# Usage:
#   - uses: ./.github/actions/setup-python
#     with:
#       python-version: "3.12"
#       requirements: etl_pipeline/requirements.txt
# =============================================================================

name: Setup Python with pip cache
description: Configures Python with pip dependency caching

inputs:
  python-version:
    description: Python version to install
    required: true
    default: "3.12"
  requirements:
    description: Path to requirements.txt file
    required: false
    default: ""
  extra-packages:
    description: Additional pip packages (space-separated)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v4
      id: pip-cache
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles(inputs.requirements) }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install requirements from file
      if: inputs.requirements != ''
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install -r ${{ inputs.requirements }}

    - name: Install extra packages
      if: inputs.extra-packages != ''
      shell: bash
      run: pip install ${{ inputs.extra-packages }}
